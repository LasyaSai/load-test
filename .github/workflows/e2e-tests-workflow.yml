name: E2E Voice & Text Testing
#Workflow to run tests 
on:
  push:
    branches: [ main, develop, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  e2e-tests:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Python dependencies
        working-directory: sample_testing/e2e-voice-text-harness
        run: |
          python -m pip install --upgrade pip
          pip install PyYAML httpx websockets python-dotenv
          
      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.0'
      
      - name: Install Xcode platforms
        run: xcodebuild -downloadAllPlatforms
      
      - name: Select available iPhone simulator
        id: select-sim
        run: |
          SIM_NAME=$(python - <<'PY'
          import json, subprocess, sys
          data = json.loads(subprocess.check_output(["xcrun", "simctl", "list", "devices", "available", "-j"]).decode())
          for runtime, devices in data.get("devices", {}).items():
              if not runtime.startswith("com.apple.CoreSimulator.SimRuntime.iOS"):
                  continue
              for device in devices:
                  if device.get("availability") != "(available)":
                      continue
                  if "iPhone" not in device.get("name", ""):
                      continue
                  print(device["name"])
                  sys.exit(0)
          raise SystemExit("No available iPhone simulator found")
          PY
          echo "SIM_NAME=$SIM_NAME" >> $GITHUB_OUTPUT
      
      - name: Build iOS app
        working-directory: sample_testing/e2e-voice-text-harness/App
        run: |
          xcodebuild build \
            -scheme VoiceTextDemo \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,name=${{ steps.select-sim.outputs.SIM_NAME }}" \
            -derivedDataPath build
      - name: Boot Simulator
        run: |
          SIM_NAME="${{ steps.select-sim.outputs.SIM_NAME }}"
          SIM_ID=$(xcrun simctl list devices available | grep -F "$SIM_NAME" | grep -oE '[0-9A-F]{8}-([0-9A-F]{4}-){3}[0-9A-F]{12}' | head -1)
          if [ -z "$SIM_ID" ]; then
            echo "No simulator ID found for $SIM_NAME"
            exit 1
          fi
          xcrun simctl boot "$SIM_ID" || true
          xcrun simctl bootstatus "$SIM_ID"
      - name: Run Backend and Tests
        working-directory: sample_testing/e2e-voice-text-harness
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: google/gemma-7b-it:free
          PYTHONPATH: ${{ github.workspace }}
          IOS_SIMULATOR: ${{ steps.select-sim.outputs.SIM_NAME }}
        run: |
          rm -rf /tmp/harness_outputs/xcresult
          python example_backend.py > backend.log 2>&1 &
          BACKEND_PID=$!
          sleep 5
          
          # Run the tests
          python harness/runner/run_tests.py --suite smoke
          
          # Cleanup backend after tests finish
          kill $BACKEND_PID || true
        continue-on-error: true

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: sample_testing/e2e-voice-text-harness/reports/