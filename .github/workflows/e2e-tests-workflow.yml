name: E2E Voice & Text Testing
#Workflow to run tests 
on:
  push:
    branches: [ main, develop, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  e2e-tests:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Python dependencies
        working-directory: sample_testing/e2e-voice-text-harness
        run: |
          python -m pip install --upgrade pip
          pip install PyYAML httpx websockets python-dotenv
          
      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'
      
      - name: Select available iPhone simulator
        id: select-sim
        run: |
          SIM_OUTPUT=$(python - <<'PY'
          import json
          import subprocess
          import sys
          import uuid

          runtimes = json.loads(subprocess.check_output(["xcrun", "simctl", "list", "runtimes", "-j"]).decode())
          runtime_candidates = [
              rt for rt in runtimes.get("runtimes", [])
              if rt.get("isAvailable") and rt.get("identifier", "").startswith("com.apple.CoreSimulator.SimRuntime.iOS")
          ]
          if not runtime_candidates:
              raise SystemExit("No available iOS runtime found")
          runtime = sorted(runtime_candidates, key=lambda rt: rt.get("version", ""), reverse=True)[0]

          devicetypes = json.loads(subprocess.check_output(["xcrun", "simctl", "list", "devicetypes", "-j"]).decode())
          device_candidates = [
              dt for dt in devicetypes.get("devicetypes", [])
              if "iPhone" in dt.get("name", "") and dt.get("identifier", "").startswith("com.apple.CoreSimulator.SimDeviceType.")
          ]
          if not device_candidates:
              raise SystemExit("No iPhone device type found")
          preferred = [dt for dt in device_candidates if dt.get("name") == "iPhone 16"]
          device_type = preferred[0] if preferred else sorted(device_candidates, key=lambda dt: dt.get("name", ""), reverse=True)[0]

          sim_name = f"e2e-{uuid.uuid4().hex[:8]}"
          sim_udid = subprocess.check_output([
              "xcrun", "simctl", "create", sim_name, device_type["identifier"], runtime["identifier"]
          ]).decode().strip()
          print(f"SIM_NAME={sim_name}")
          print(f"SIM_UDID={sim_udid}")
          PY
          )
          echo "$SIM_OUTPUT" >> "$GITHUB_OUTPUT"
      
      - name: Build iOS app
        working-directory: sample_testing/e2e-voice-text-harness/App
        run: |
          xcodebuild build \
            -scheme VoiceTextDemo \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,id=${{ steps.select-sim.outputs.SIM_UDID }}" \
            -derivedDataPath build
      - name: Boot Simulator
        run: |
          SIM_UDID="${{ steps.select-sim.outputs.SIM_UDID }}"
          xcrun simctl boot "$SIM_UDID" || true
          xcrun simctl bootstatus "$SIM_UDID" -b
      - name: Run Tests
        working-directory: sample_testing/e2e-voice-text-harness
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: google/gemma-7b-it:free
          PYTHONPATH: ${{ github.workspace }}
          IOS_SIMULATOR: ${{ steps.select-sim.outputs.SIM_NAME }}
          IOS_SIMULATOR_UDID: ${{ steps.select-sim.outputs.SIM_UDID }}
        run: |
          python harness/runner/run_tests.py --suite smoke

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: sample_testing/e2e-voice-text-harness/reports/
