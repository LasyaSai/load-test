name: E2E Voice & Text Testing
#Workflow to run tests 
on:
  push:
    branches: [ main, develop, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  e2e-tests:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Python dependencies
        working-directory: sample_testing/e2e-voice-text-harness
        run: |
          python -m pip install --upgrade pip
          pip install PyYAML httpx websockets python-dotenv
          
      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'
      
      - name: Select available iPhone simulator
        id: select-sim
        run: |
          SIM_OUTPUT=$(python - <<'PY'
          import json, subprocess, sys
          data = json.loads(subprocess.check_output(["xcrun", "simctl", "list", "devices", "available", "-j"]).decode())
          for runtime, devices in data.get("devices", {}).items():
              if not runtime.startswith("com.apple.CoreSimulator.SimRuntime.iOS"):
                  continue
              for device in devices:
                  if device.get("availability") != "(available)":
                      continue
                  if "iPhone" not in device.get("name", ""):
                      continue
                  print(f"SIM_NAME={device['name']}")
                  print(f"SIM_UDID={device['udid']}")
                  sys.exit(0)
          raise SystemExit("No available iPhone simulator found")
          PY
          )
          echo "$SIM_OUTPUT" >> "$GITHUB_OUTPUT"
      
      - name: Build iOS app
        working-directory: sample_testing/e2e-voice-text-harness/App
        run: |
          xcodebuild build \
            -scheme VoiceTextDemo \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,id=${{ steps.select-sim.outputs.SIM_UDID }}" \
            -derivedDataPath build
      - name: Boot Simulator
        run: |
          SIM_UDID="${{ steps.select-sim.outputs.SIM_UDID }}"
          xcrun simctl boot "$SIM_UDID" || true
          xcrun simctl bootstatus "$SIM_UDID" -b
      - name: Run Tests
        working-directory: sample_testing/e2e-voice-text-harness
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: google/gemma-7b-it:free
          PYTHONPATH: ${{ github.workspace }}
          IOS_SIMULATOR: ${{ steps.select-sim.outputs.SIM_NAME }}
          IOS_SIMULATOR_UDID: ${{ steps.select-sim.outputs.SIM_UDID }}
        run: |
          python harness/runner/run_tests.py --suite smoke

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: sample_testing/e2e-voice-text-harness/reports/
