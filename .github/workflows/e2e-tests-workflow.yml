name: E2E Voice & Text Testing

on:
  push:
    branches: [ main, develop, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  e2e-tests:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Python dependencies
        working-directory: sample_testing/e2e-voice-text-harness
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || pip install httpx websockets python-dotenv
      
      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.0'
      
      - name: Build iOS app
        working-directory: sample_testing/e2e-voice-text-harness/app
        run: |
          xcodebuild build \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -derivedDataPath build \
            ONLY_ACTIVE_ARCH=NO

      - name: Start WebSocket backend
        working-directory: sample_testing/e2e-voice-text-harness
        run: |
          python example_backend.py > backend.log 2>&1 &
          sleep 5
      
      - name: Run E2E tests
        working-directory: sample_testing/e2e-voice-text-harness
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: google/gemma-7b-it:free
        run: |
          python harness/runner/run_tests.py --suite smoke
        continue-on-error: true

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: sample_testing/e2e-voice-text-harness/reports/