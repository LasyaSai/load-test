# Maestro flow: voice button interaction smoke test
# Actual audio injection + capture is handled by the XCTest bridge.
# This flow validates the UI state machine (button states, message appearance).

appId: ${APP_ID}
---
- launchApp:
    arguments:
      CASE_TYPE: ${CASE_TYPE}
      CASE_OUTPUT_PATH: ${CASE_OUTPUT_PATH}
      CASE_INPUT_AUDIO: ${CASE_INPUT_AUDIO}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL}
      REGRESSION_BREAK_TOOL_CALL: ${REGRESSION_BREAK_TOOL_CALL}
- assertVisible:
    id: voice_button
- tapOn:
    id: voice_button
# Voice button should now show stop icon (recording state)
- assertVisible:
    id: voice_button
- waitForAnimationToEnd:
    timeout: 2000
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    id: voice_button
# After stop: wait for assistant response
- waitForAnimationToEnd:
    timeout: 30000
- assertVisible:
    id: assistant_message
- takeScreenshot: reports/maestro_voice_smoke
