# Maestro flow: text chat smoke test
# Run with: maestro test maestro/text_chat_flow.yaml
#
# Maestro handles UI interaction. The Python runner dispatches this
# flow for text cases that don't need the XCTest audio bridge.

appId: ${APP_ID}
---
- launchApp:
    arguments:
      CASE_TYPE: ${CASE_TYPE}
      CASE_OUTPUT_PATH: ${CASE_OUTPUT_PATH}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL}
- assertVisible:
    id: text_input_field
- tapOn:
    id: text_input_field
- inputText: ${CASE_INPUT_TEXT}
- tapOn:
    id: send_text_button
- waitForAnimationToEnd:
    timeout: 30000
- assertVisible:
    id: assistant_message
- takeScreenshot: reports/maestro_text_smoke
